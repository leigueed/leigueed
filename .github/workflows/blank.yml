# Workflow para gerar métricas do GitHub

name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: leigueed
          template: classic
          base: header, activity, community, repositories, languages
          
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          filename: github-metrics.svg
      
      - name: Commit e push
        run: |
          if [[ -n $(git status -s) ]]; then
            git config --global user.email "ed.leigue@hotmail.com"
            git config --global user.name "leigueed"
            git add github-metrics.svg
            git commit -m "Atualiza métricas do GitHub"
            git push
          fi
